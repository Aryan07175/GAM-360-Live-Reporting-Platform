version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
    environment:
      - GAM_CREDENTIALS_PATH=config/googleads.yaml
      # You can override variables here if needed
    restart: unless-stopped

  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Use Docker service name 'backend' for inter-container communication
      - NEXT_PUBLIC_MCP_SERVER_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

